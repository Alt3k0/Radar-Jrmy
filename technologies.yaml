      github: kubernetes/kubernetes
      cncf: true

  - id: terraform
    name: Terraform
    category: devops
    position: trial
    since: "2024-03"
    switching_cost: medium
    notes: "IaC multi-cloud, alternative OpenTofu à considérer"
