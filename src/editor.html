<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Radar — Éditeur</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .editor-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--bg-card-hover); }
    .btn-primary {
      background: var(--color-trial);
      border-color: var(--color-trial);
      color: #fff;
    }
    .btn-primary:hover { background: #1a6dbb; }
    #changed-count { font-size: 12px; color: var(--color-assess); }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }
    .tech-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .card-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 10px;
    }
    .card-name { font-weight: 600; font-size: 14px; }
    .card-category { font-size: 11px; color: var(--text-muted); }
    .position-buttons {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .pos-btn {
      flex: 1;
      padding: 5px 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .pos-btn:hover { border-color: #4a5068; color: var(--text); }
    .pos-btn.active {
      background: color-mix(in srgb, var(--btn-color, #185FA5) 20%, transparent);
      border-color: var(--btn-color, #185FA5);
      color: var(--btn-color, #185FA5);
    }
    .notes-input {
      width: 100%;
      background: #12151f;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 12px;
      resize: vertical;
      font-family: inherit;
    }
    .notes-input:focus { outline: none; border-color: var(--color-trial); }

    #export-section {
      display: none;
      margin-top: 28px;
    }
    #export-section h2 { font-size: 16px; margin-bottom: 10px; }
    #yaml-output {
      width: 100%;
      background: #0a0c14;
      border: 1px solid var(--border);
      color: #a8ff78;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 12px;
      padding: 14px;
      border-radius: 6px;
      resize: vertical;
      min-height: 300px;
    }
    .export-actions { margin-top: 10px; display: flex; gap: 10px; }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="index.html">⬡ Tech Radar</a>
    <a href="index.html">Radar</a>
    <a href="table.html">Tableau</a>
    <a href="editor.html" class="active">Éditeur</a>
    <span class="spacer"></span>
    <span class="last-update">Mise à jour : <span id="last-update">—</span></span>
  </nav>

  <main>
    <h1>Éditeur de positions</h1>
    <p class="page-subtitle">Modifiez les positions ADOPT / TRIAL / ASSESS / HOLD, puis exportez le YAML mis à jour.</p>

    <div class="editor-toolbar">
      <button class="btn btn-primary" id="export-btn">Exporter YAML</button>
      <button class="btn" id="reset-btn">Réinitialiser</button>
      <span id="changed-count"></span>
    </div>

    <div class="cards-grid" id="cards">
      <div class="loading">Chargement...</div>
    </div>

    <section id="export-section">
      <h2>technologies.yaml généré</h2>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px">
        Copiez ce contenu dans votre fichier <code>technologies.yaml</code> et committez.
      </p>
      <textarea id="yaml-output" readonly></textarea>
      <div class="export-actions">
        <button class="btn" id="copy-btn">Copier</button>
      </div>
    </section>
  </main>

  <script type="module" src="js/editor.js"></script>
</body>
</html>
