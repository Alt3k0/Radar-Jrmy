<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Radar — Tableau</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .table-wrapper {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead { background: var(--bg-card); }
    th {
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
      user-select: none;
    }
    th.sort-asc::after { content: ' ↑'; color: var(--color-trial); }
    th.sort-desc::after { content: ' ↓'; color: var(--color-trial); }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid #1e2235;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--bg-card-hover); }
    .count-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="index.html">⬡ Tech Radar</a>
    <a href="index.html">Radar</a>
    <a href="table.html" class="active">Tableau</a>
    <a href="editor.html">Éditeur</a>
    <span class="spacer"></span>
    <span class="rising-badge" id="rising-badge" style="display:none">📈 <span id="rising-count">0</span></span>
    <span class="last-update">Mise à jour : <span id="last-update">—</span></span>
  </nav>

  <main>
    <h1>Toutes les technologies</h1>
    <p class="page-subtitle">Tableau filtrable et triable — <strong>cliquer sur une ligne</strong> pour voir les avantages, inconvénients et cas d'usage</p>

    <div class="filters">
      <input type="text" id="search" placeholder="Rechercher..." aria-label="Rechercher une technologie">
      <select id="filter-position" aria-label="Filtrer par position">
        <option value="">Toutes positions</option>
        <option value="adopt">Adopt</option>
        <option value="trial">Trial</option>
        <option value="assess">Assess</option>
        <option value="hold">Hold</option>
      </select>
      <select id="filter-category" aria-label="Filtrer par catégorie">
        <option value="">Toutes catégories</option>
      </select>
    </div>

    <div class="count-bar">
      <span id="count">—</span>
    </div>

    <div class="table-wrapper" role="region" aria-label="Technologies">
      <table>
        <thead>
          <tr>
            <th data-sort="name" tabindex="0">Nom</th>
            <th data-sort="category" tabindex="0">Catégorie</th>
            <th data-sort="position" tabindex="0">Position</th>
            <th data-sort="trajectory" tabindex="0">Trajectoire</th>
            <th data-sort="stars" tabindex="0">GitHub Stars</th>
            <th data-sort="npm" tabindex="0">npm / semaine</th>
            <th data-sort="switching_cost" tabindex="0">Migration</th>
            <th>Collecté le</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="8" class="loading">Chargement...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script type="module" src="js/table.js"></script>
</body>
</html>
