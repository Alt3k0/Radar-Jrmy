<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Radar</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    #radar-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #radar-svg { display: block; max-width: 100%; height: auto; }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="index.html">⬡ Tech Radar</a>
    <a href="index.html" class="active">Radar</a>
    <a href="table.html">Tableau</a>
    <a href="editor.html">Éditeur</a>
    <span class="spacer"></span>
    <span class="last-update">Mise à jour : <span id="last-update">—</span></span>
  </nav>

  <main>
    <h1>Radar Technologique</h1>
    <p class="page-subtitle">Vue radar — chaque point représente une technologie positionnée sur 4 anneaux</p>

    <div class="category-filters" id="category-filters"></div>

    <div id="radar-wrapper">
      <div id="radar-container">
        <svg id="radar-svg"></svg>
        <div class="loading" id="loading-msg">Chargement...</div>
      </div>
      <div class="legend" id="legend"></div>
    </div>
  </main>

  <div class="tooltip" id="tooltip"></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script type="module" src="js/radar.js"></script>
</body>
</html>
