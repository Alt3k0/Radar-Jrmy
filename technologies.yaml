      github: angular/angular
      npm_package: "@angular/core"

  - id: spring-boot
    name: Spring Boot
    category: frameworks_back
    position: adopt
    since: "2024-01"
    switching_cost: high
    notes: "Standard Java backend, auto-configuration, large écosystème"
    sources:
      github: spring-projects/spring-boot

  - id: nestjs
    name: NestJS
    category: frameworks_back
    position: trial
    since: "2024-03"
    switching_cost: medium
    notes: "Architecture modulaire Node.js, TypeScript natif"
