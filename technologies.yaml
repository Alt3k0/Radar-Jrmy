technologies:
  - id: typescript
    name: TypeScript
    category: languages
    position: adopt
    since: "2024-01"
    switching_cost: medium
    notes: "Standard de facto pour tout projet Node/web"
    sources:
      github: microsoft/TypeScript
      npm_package: typescript

  - id: java
    name: Java
    category: languages
    position: adopt
    since: "2024-01"
    switching_cost: high
    notes: "Langage backend mature, écosystème Spring solide"
    sources:
      github: openjdk/jdk

  - id: python
    name: Python
    category: languages
    position: adopt
    since: "2024-01"
    switching_cost: medium
    notes: "Scripting, data, ML/AI — polyvalence maximale"
    sources:
      github: python/cpython
      pypi_package: pip

  - id: react
    name: React
    category: frameworks_front
    position: adopt
    since: "2024-01"
    switching_cost: medium
    notes: "Dominant en production, écosystème Next.js solide"
    sources:
      github: facebook/react
      npm_package: react

  - id: angular
    name: Angular
    category: frameworks_front
    position: trial
    since: "2024-03"
    switching_cost: high
    notes: "Framework complet, pertinent pour grandes applications d'entreprise"
