      github: nestjs/nest
      npm_package: "@nestjs/core"

  - id: flutter
    name: Flutter
    category: mobile
    position: adopt
    since: "2024-01"
    switching_cost: high
    notes: "Cross-platform iOS/Android/Web avec une seule codebase Dart"
    sources:
      github: flutter/flutter

  - id: postgresql
    name: PostgreSQL
    category: databases
    position: adopt
    since: "2024-01"
    switching_cost: high
    notes: "SGBDR de référence, JSON natif, fiabilité éprouvée"
